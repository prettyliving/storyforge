<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>StoryForge — Write with Consequence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    html,body,#root{height:100%;margin:0;padding:0;background:#080706;}
    #loading{position:fixed;inset:0;background:#080706;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:1.2rem;transition:opacity 0.5s;}
    #loading.hidden{opacity:0;pointer-events:none;}
    .load-logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:#f2ead8;}
    .load-logo span{color:#c94b1a;}
    .load-bar{width:120px;height:1px;background:rgba(201,75,26,0.15);overflow:hidden;}
    .load-fill{height:100%;background:#c94b1a;animation:lb 1.2s ease forwards;}
    @keyframes lb{from{width:0}to{width:100%}}
    .load-label{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.22em;text-transform:uppercase;color:#7a6f62;}
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');
  :root {
    --void:#080706;--coal:#111009;--char:#1a1814;--slate:#2c2820;--ash:#3d3830;
    --fog:#7a6f62;--mist:#a89e92;--parchment:#e8ddc8;--cream:#f2ead8;
    --ember:#c94b1a;--flame:#e8622a;--gold:#c9943a;--sepia:#b8956a;--green:#4caf7d;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--void);overflow-x:hidden;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:var(--void);}
  ::-webkit-scrollbar-thumb{background:var(--ember);}

  /* ── SHARED ── */
  .mono{font-family:'DM Mono',monospace;}
  .display{font-family:'Cormorant Garamond',serif;}
  .serif{font-family:'Libre Baskerville',serif;}

  /* ── BUTTONS ── */
  .btn{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.75rem 1.8rem;cursor:pointer;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:0.5rem;}
  .btn-fire{background:var(--ember);color:white;}
  .btn-fire:hover:not(:disabled){background:var(--flame);transform:translateY(-1px);}
  .btn-fire:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;color:var(--mist);border:1px solid rgba(122,111,98,0.3);}
  .btn-ghost:hover{color:var(--parchment);border-color:var(--mist);}
  .btn-sm{padding:0.45rem 1rem;font-size:0.55rem;}
  .btn-full{width:100%;justify-content:center;}

  /* ── SPINNER / ANIM ── */
  .spin{width:11px;height:11px;border:1.5px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spinning 0.7s linear infinite;flex-shrink:0;}
  @keyframes spinning{to{transform:rotate(360deg);}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

  /* ════════════════════════════════════════
     LANDING PAGE
  ════════════════════════════════════════ */
  .landing{background:var(--void);color:var(--parchment);font-family:'Libre Baskerville',serif;min-height:100vh;}

  /* Nav */
  .lnav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3rem;background:linear-gradient(to bottom,rgba(8,7,6,0.97) 70%,transparent);border-bottom:1px solid rgba(201,75,26,0.08);}
  .lnav-logo{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--cream);}
  .lnav-logo span{color:var(--ember);}
  .lnav-links{display:flex;gap:2.5rem;list-style:none;}
  .lnav-links a{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--fog);text-decoration:none;cursor:pointer;transition:color 0.2s;}
  .lnav-links a:hover{color:var(--parchment);}
  .lnav-right{display:flex;align-items:center;gap:0.8rem;}
  .lnav-signin{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--mist);background:none;border:none;cursor:pointer;padding:0.5rem 1rem;transition:color 0.2s;}
  .lnav-signin:hover{color:var(--parchment);}
  .lnav-cta{background:var(--ember);color:white;border:none;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.55rem 1.3rem;cursor:pointer;transition:all 0.2s;}
  .lnav-cta:hover{background:var(--flame);}

  /* Hero */
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8rem 2rem 5rem;text-align:center;position:relative;background:radial-gradient(ellipse at 50% 38%,rgba(201,75,26,0.09) 0%,transparent 65%);}
  .hero::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(201,75,26,0.03) 80px);pointer-events:none;}
  .hero-eyebrow{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--ember);margin-bottom:2rem;display:flex;align-items:center;gap:1rem;animation:fadeUp 0.8s 0.1s both;}
  .hero-eyebrow::before,.hero-eyebrow::after{content:'';width:36px;height:1px;background:var(--ember);opacity:0.5;}
  .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,9vw,8.5rem);font-weight:300;line-height:0.92;color:var(--cream);animation:fadeUp 0.9s 0.25s both;}
  .hero-title strong{font-weight:700;display:block;}
  .hero-title em{font-style:italic;color:var(--sepia);display:block;}
  .hero-sub{font-size:1rem;color:var(--mist);max-width:500px;margin:2.2rem auto 0;line-height:1.9;animation:fadeUp 0.8s 0.45s both;}
  .hero-btns{display:flex;gap:1rem;margin-top:3rem;justify-content:center;animation:fadeUp 0.8s 0.6s both;}
  .hero-stats{display:flex;gap:4rem;margin-top:5rem;animation:fadeUp 0.8s 0.75s both;}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:var(--cream);line-height:1;}
  .stat-lbl{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--fog);margin-top:0.3rem;}
  .stat-div{width:1px;background:rgba(122,111,98,0.18);}
  .scroll-cue{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.4rem;font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fog);opacity:0;animation:fadeIn 1s 1.5s forwards;}
  .scroll-line{width:1px;height:38px;background:linear-gradient(to bottom,var(--ember),transparent);animation:blink 2s ease-in-out infinite;}

  /* Philosophy strip */
  .philosophy{background:var(--char);border-top:1px solid rgba(201,75,26,0.12);border-bottom:1px solid rgba(201,75,26,0.12);padding:5rem 3rem;}
  .philosophy-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:5rem;align-items:start;}
  .section-label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--ember);writing-mode:vertical-lr;transform:rotate(180deg);white-space:nowrap;}
  .phil-title{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;line-height:1.1;color:var(--cream);margin-bottom:1.5rem;}
  .phil-title em{font-style:italic;color:var(--sepia);}
  .phil-desc{color:var(--mist);font-size:0.95rem;line-height:1.9;margin-bottom:2.5rem;max-width:560px;}
  .pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
  .pillar{padding:1.5rem;border:1px solid rgba(201,75,26,0.12);transition:all 0.3s;}
  .pillar:hover{border-color:rgba(201,75,26,0.35);transform:translateY(-3px);}
  .pillar-icon{font-size:1.3rem;margin-bottom:0.8rem;}
  .pillar h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--cream);margin-bottom:0.5rem;}
  .pillar p{font-size:0.85rem;color:var(--fog);line-height:1.7;}

  /* Personalities showcase */
  .p-showcase{padding:6rem 3rem;background:var(--void);}
  .p-showcase-inner{max-width:1100px;margin:0 auto;}
  .section-eye{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--ember);margin-bottom:0.6rem;}
  .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,4vw,3.5rem);font-weight:300;color:var(--cream);line-height:1.1;margin-bottom:0.8rem;}
  .section-title em{font-style:italic;color:var(--sepia);}
  .section-sub{color:var(--mist);font-size:0.9rem;max-width:480px;line-height:1.85;margin-bottom:3rem;}
  .p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,75,26,0.1);}
  .p-card{background:var(--void);padding:2rem;cursor:pointer;transition:background 0.25s;position:relative;overflow:hidden;}
  .p-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ember);transform:scaleX(0);transition:transform 0.3s;}
  .p-card:hover{background:var(--char);}
  .p-card:hover::after{transform:scaleX(1);}
  .p-card-genre{font-family:'DM Mono',monospace;font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ember);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
  .p-card-genre::before{content:'';display:inline-block;width:16px;height:1px;background:var(--ember);}
  .p-card-name{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-style:italic;color:var(--parchment);margin-bottom:0.7rem;line-height:1.2;}
  .p-card-desc{font-size:0.83rem;color:var(--fog);line-height:1.7;margin-bottom:1.2rem;}
  .p-card-quote{font-style:italic;color:var(--sepia);font-size:0.88rem;border-left:2px solid var(--ember);padding-left:0.9rem;line-height:1.6;}

  /* Feature list */
  .features{padding:6rem 3rem;background:var(--coal);border-top:1px solid rgba(201,75,26,0.1);}
  .features-inner{max-width:1100px;margin:0 auto;}
  .features-head{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:end;margin-bottom:4rem;}
  .feature-rows{border-top:1px solid rgba(201,75,26,0.1);}
  .feature-row{display:grid;grid-template-columns:60px 1fr 1fr;gap:2.5rem;padding:2.5rem 0;border-bottom:1px solid rgba(201,75,26,0.08);align-items:start;transition:padding-left 0.3s;}
  .feature-row:hover{padding-left:0.6rem;}
  .feature-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:900;color:rgba(201,75,26,0.15);line-height:1;}
  .feature-tag{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;background:var(--ember);color:white;padding:0.2rem 0.6rem;display:inline-block;margin-bottom:0.7rem;}
  .feature-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--cream);margin-bottom:0.5rem;}
  .feature-desc{font-size:0.88rem;color:var(--mist);line-height:1.8;}
  .feature-detail{font-size:0.83rem;color:var(--fog);line-height:1.9;}
  .feature-detail li{list-style:none;padding-left:1rem;position:relative;margin-bottom:0.3rem;}
  .feature-detail li::before{content:'—';position:absolute;left:0;color:var(--ember);}

  /* Pricing */
  .pricing{padding:6rem 3rem;background:var(--char);}
  .pricing-inner{max-width:860px;margin:0 auto;}
  .pricing-cards{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(201,75,26,0.1);margin-top:3rem;}
  .price-card{background:var(--char);padding:3rem;position:relative;}
  .price-card.featured{background:var(--coal);}
  .price-tier{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fog);margin-bottom:1.3rem;}
  .price-amount{font-family:'Cormorant Garamond',serif;font-size:4.5rem;font-weight:700;color:var(--cream);line-height:1;margin-bottom:0.2rem;}
  .price-amount small{font-size:1.1rem;font-weight:300;color:var(--fog);}
  .price-divider{height:1px;background:rgba(201,75,26,0.1);margin:1.5rem 0;}
  .price-features{list-style:none;display:flex;flex-direction:column;gap:0.7rem;margin-bottom:2rem;}
  .price-features li{display:flex;gap:0.7rem;font-size:0.85rem;color:var(--mist);align-items:flex-start;}
  .price-features li::before{content:'—';color:var(--ember);flex-shrink:0;}
  .price-btn{width:100%;padding:0.9rem;border:1px solid rgba(201,75,26,0.3);background:transparent;color:var(--parchment);font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
  .price-card.featured .price-btn{background:var(--ember);border-color:var(--ember);}
  .price-btn:hover{background:var(--ember);border-color:var(--ember);color:white;}
  .featured-badge{position:absolute;top:0;right:1.8rem;background:var(--ember);color:white;font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.25rem 0.8rem;}

  /* CTA strip */
  .cta-strip{padding:7rem 3rem;background:var(--void);text-align:center;position:relative;overflow:hidden;}
  .cta-strip::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(201,75,26,0.1) 0%,transparent 70%);pointer-events:none;}
  .cta-strip h2{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,6vw,6rem);font-weight:300;color:var(--cream);line-height:1.0;margin-bottom:1.5rem;}
  .cta-strip h2 em{font-style:italic;color:var(--sepia);}
  .cta-strip p{color:var(--mist);font-size:1rem;margin-bottom:2.5rem;}

  /* Footer */
  .footer{background:var(--coal);padding:3rem;border-top:1px solid rgba(201,75,26,0.08);display:flex;justify-content:space-between;align-items:center;}
  .footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--cream);}
  .footer-logo span{color:var(--ember);}
  .footer-copy{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;color:var(--fog);}

  /* ════════════════════════════════════════
     AUTH MODAL
  ════════════════════════════════════════ */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;backdrop-filter:blur(4px);}
  .modal{background:var(--char);border:1px solid rgba(201,75,26,0.2);width:100%;max-width:440px;margin:1rem;animation:slideDown 0.3s ease;position:relative;}
  .modal-head{padding:1.8rem 2rem 0;display:flex;align-items:flex-start;justify-content:space-between;}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--cream);line-height:1.1;}
  .modal-title em{font-style:italic;color:var(--sepia);}
  .modal-close{background:none;border:none;color:var(--fog);cursor:pointer;font-size:1.1rem;padding:0.2rem;line-height:1;transition:color 0.2s;}
  .modal-close:hover{color:var(--parchment);}
  .modal-body{padding:1.5rem 2rem 2rem;}
  .modal-tabs{display:flex;gap:0;margin-bottom:1.8rem;border-bottom:1px solid rgba(201,75,26,0.1);}
  .modal-tab{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--fog);background:none;border:none;border-bottom:2px solid transparent;padding:0.6rem 1rem 0.6rem 0;cursor:pointer;margin-right:1.5rem;transition:all 0.2s;}
  .modal-tab.active{color:var(--ember);border-bottom-color:var(--ember);}
  .auth-field{margin-bottom:1.1rem;}
  .auth-label{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--fog);display:block;margin-bottom:0.4rem;}
  .auth-input{width:100%;background:var(--slate);border:1px solid rgba(122,111,98,0.2);color:var(--parchment);font-family:'Libre Baskerville',serif;font-size:0.92rem;padding:0.75rem 1rem;outline:none;transition:border-color 0.2s;}
  .auth-input:focus{border-color:rgba(201,75,26,0.45);}
  .auth-divider{display:flex;align-items:center;gap:1rem;margin:1.2rem 0;}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:rgba(122,111,98,0.15);}
  .auth-divider span{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--fog);}
  .auth-error{background:rgba(201,75,26,0.12);border:1px solid rgba(201,75,26,0.3);color:var(--ember);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.08em;padding:0.6rem 0.9rem;margin-bottom:1rem;}
  .auth-footer{text-align:center;margin-top:1.2rem;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;color:var(--fog);}
  .auth-footer button{background:none;border:none;color:var(--ember);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;text-decoration:underline;}

  /* ════════════════════════════════════════
     DASHBOARD / APP
  ════════════════════════════════════════ */
  .app{display:flex;flex-direction:column;height:100vh;background:var(--void);color:var(--parchment);font-family:'Libre Baskerville',Georgia,serif;font-size:15px;overflow:hidden;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;background:rgba(8,7,6,0.98);border-bottom:1px solid rgba(201,75,26,0.15);flex-shrink:0;z-index:200;}
  .topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--cream);}
  .topbar-logo span{color:var(--ember);}
  .story-title-input{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:0.62rem;letter-spacing:0.12em;color:var(--fog);width:160px;padding:0.3rem 0.5rem;border-bottom:1px solid rgba(122,111,98,0.2);transition:border-color 0.2s;}
  .story-title-input:focus{border-bottom-color:var(--ember);color:var(--parchment);}
  .topbar-right{display:flex;align-items:center;gap:0.8rem;}
  .user-pill{display:flex;align-items:center;gap:0.6rem;padding:0.3rem 0.8rem 0.3rem 0.4rem;border:1px solid rgba(122,111,98,0.2);cursor:pointer;transition:border-color 0.2s;}
  .user-pill:hover{border-color:rgba(201,75,26,0.3);}
  .user-avatar{width:24px;height:24px;border-radius:50%;background:var(--ember);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:0.6rem;color:white;font-weight:700;}
  .user-name{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;color:var(--mist);}
  .tabbar{display:flex;background:var(--coal);border-bottom:1px solid rgba(201,75,26,0.12);flex-shrink:0;overflow-x:auto;}
  .tabbar::-webkit-scrollbar{height:2px;}
  .tab-btn{display:flex;align-items:center;gap:0.5rem;padding:0 1.4rem;height:44px;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--fog);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .tab-btn:hover{color:var(--parchment);}
  .tab-btn.active{color:var(--ember);border-bottom-color:var(--ember);}
  .tab-icon{font-size:0.85rem;}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;}

  /* Panel */
  .panel{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;}
  .panel-title{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--cream);line-height:1.05;margin-bottom:0.4rem;}
  .panel-title em{font-style:italic;color:var(--sepia);}
  .panel-sub{font-size:0.88rem;color:var(--mist);margin-bottom:2rem;max-width:560px;line-height:1.8;}
  .eyebrow{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--ember);margin-bottom:0.5rem;}

  /* Form */
  .field{margin-bottom:1.2rem;}

// ─── API ──────────────────────────────────────────────────────────────────────
async function callClaude(prompt, maxTokens=1200) {
  const workerUrl = window.STORYFORGE_WORKER_URL;
  if (!workerUrl) {
    window.dispatchEvent(new CustomEvent('sf-needs-url'));
    throw new Error("Please enter your Worker URL first.");
  }
  const res = await fetch(workerUrl, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  if(!res.ok) throw new Error((data.error&&data.error.message)||"HTTP "+res.status);
  return (data.content||[]).map(b=>b.text||"").join("");
}

function parseSections(text) {
  const out={};
  const lines=text.split("\n");
  let cur=null,buf=[];
  const flush=()=>{if(cur)out[cur]=buf.join("\n").trim();};
  for(const line of lines){
    const u=line.trim().toUpperCase().replace(/[*:#]/g,"").trim();
    if(u==="CRITIQUE"){flush();cur="critique";buf=[];}
    else if(u==="REWRITE"){flush();cur="rewrite";buf=[];}
    else if(u==="GO DARKER"||u==="DARKER"){flush();cur="darker";buf=[];}
    else if(u==="RIVALRY"){flush();cur="rivalry";buf=[];}
    else if(u.startsWith("PLOT SKELETON")||u.startsWith("SKELETON")){flush();cur="skeleton"+Object.keys(out).filter(k=>k.startsWith("skeleton")).length;buf=[];}
    else if(u.startsWith("CHARACTER CONFLICT")||u.startsWith("CONFLICT WEB")){flush();cur="conflict"+Object.keys(out).filter(k=>k.startsWith("conflict")).length;buf=[];}
    else if(u.startsWith("TWIST")){flush();cur="twist";buf=[];}
    else if(u.startsWith("ARC")||u.startsWith("MULTI")){flush();cur="arc";buf=[];}
    else if(u==="FLAGS"||u==="ISSUES"||u==="PROBLEMS"){flush();cur="flags";buf=[];}
    else if(["LYRICAL","BRUTAL","MINIMALIST","ELEVATED"].includes(u)){flush();cur=u.toLowerCase();buf=[];}
    else if(u==="SUBTEXT"){flush();cur="subtext";buf=[];}
    else{buf.push(line);}
  }
  flush();
  if(!Object.keys(out).length)out.critique=text.trim();
  return out;
}

function AuthModal({ initialMode="signin", onAuth, onClose }) {

    setError("");

    if (!password.trim()) { setError("Password is required."); return; }
    if (mode==="signup" && !name.trim()) { setError("Name is required."); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters."); return; }
    setLoading(true);
    await new Promise(r => setTimeout(r, 900));
    setLoading(false);

            <label className="auth-label">Email</label>

              onKeyDown={e=>{if(e.key==="Enter")submit();}}/>

// ─── FORGE TAB ────────────────────────────────────────────────────────────────
function ForgeTab() {
  const [personality,setPersonality]=React.useState("dark-romance");
  const [rivalry,setRivalry]=React.useState(false);
  const [input,setInput]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [outputs,setOutputs]=React.useState(null);
  const [tab,setTab]=React.useState("critique");
  const p=PERSONALITIES.find(x=>x.key===personality);

  const forge=async()=>{
    if(!input.trim()||loading)return;
    setLoading(true);setOutputs(null);
    try{
      let prompt=p.prompt+"\n\nHere is the scene:\n\n"+input;
      if(rivalry)prompt+="\n\nRIVALRY MODE: Also add a RIVALRY section arguing for the morally messier path the writer is avoiding.";
      const raw=await callClaude(prompt);
      const s=parseSections(raw);
      if(!s.critique&&!s.rewrite&&!s.darker)s.critique=raw;
      setOutputs(s);setTab("critique");
    }catch(e){setOutputs({critique:"Error: "+e.message});}
    setLoading(false);
  };

  const tabs=[
    {key:"critique",label:"Critique",cls:"tag-c"},
    {key:"rewrite",label:"Rewrite",cls:"tag-r"},
    {key:"darker",label:"Go Darker",cls:"tag-d"},
    ...(rivalry?[{key:"rivalry",label:"⚡ Rivalry",cls:"tag-v"}]:[]),
  ];

  return(
    <div className="panel">
      <div className="eyebrow">AI Co-Writer · Powered by Claude</div>
      <h2 className="panel-title">The <em>Forge.</em></h2>
      <p className="panel-sub">Write a scene. Pick your co-writer's personality. Get a critique, a rewrite, and a darker alternative — not flattery.</p>
      <div className="p-chips">
        {PERSONALITIES.map(px=>(
          <button key={px.key} className={"p-chip"+(personality===px.key?" active":"")} onClick={()=>setPersonality(px.key)}>
            {px.emoji} {px.label}
          </button>
        ))}
      </div>
      <div className="rivalry-row">
        <span className="rlabel">Rivalry Mode</span>
        <div className={"toggle"+(rivalry?" on":"")} onClick={()=>setRivalry(!rivalry)}><div className="toggle-k"/></div>
        <span className={"rbadge"+(rivalry?" on":"")}>Chaos Enabled</span>
      </div>
      <div className="forge-grid">
        <div className="forge-pane">
          <div className="pane-head"><span className="pane-title">Your Scene</span><div className="pane-dot"/></div>
          <textarea className="forge-ta" value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")forge();}}
            placeholder={"Write a scene, a line of dialogue, a moment of conflict…\n\nPress ⌘↵ to forge."} maxLength={800}/>
          <div className="pane-foot">
            <span className="char-ct">{input.length} / 800</span>
            <button className="btn btn-fire btn-sm" onClick={forge} disabled={loading||!input.trim()}>
              {loading?<><div className="spin"/><span>Forging…</span></>:"Forge It →"}
            </button>
          </div>
        </div>
        <div className="forge-pane out-pane">
          {outputs&&<div className="out-tabs">{tabs.map(t=>(
            <button key={t.key} className={"out-tab"+(tab===t.key?" active":"")} onClick={()=>setTab(t.key)}>{t.label}</button>
          ))}</div>}
          <div style={{padding:"1.2rem",minHeight:"200px",overflowY:"auto",maxHeight:"420px"}}>
            {loading?<div className="out-placeholder"><div className="spin"/><p style={{marginTop:"0.8rem",color:"var(--fog)"}}>The forge is thinking…</p></div>
            :!outputs?<div className="out-placeholder"><div className="out-placeholder-icon">🖋</div><p>Awaiting your scene</p></div>
            :<div><span className={"out-tag "+(tabs.find(t=>t.key===tab)?.cls||"tag-c")}>{tabs.find(t=>t.key===tab)?.label}</span>
              <div className="out-body" style={{padding:0,marginTop:"0.6rem"}}>
                {(outputs[tab]||"Not available.").split("\n\n").map((p,i)=><p key={i}>{p}</p>)}
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── BLUEPRINT TAB ────────────────────────────────────────────────────────────
function BlueprintTab(){
  const [genre,setGenre]=React.useState("Dark Romance");
  const [tropes,setTropes]=React.useState([]);
  const [themes,setThemes]=React.useState([]);
  const [tones,setTones]=React.useState([]);
  const [spice,setSpice]=React.useState(3);
  const [intensity,setIntensity]=React.useState(3);
  const [loading,setLoading]=React.useState(false);
  const [results,setResults]=React.useState(null);
  const toggleArr=(arr,setArr,val)=>setArr(arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]);

  const generate=async()=>{
    setLoading(true);setResults(null);
    const prompt=`You are StoryForge's Story Blueprint engine. Generate a story blueprint for:\n\nGENRE: ${genre}\nTROPES: ${tropes.join(", ")||"Open"}\nTHEMES: ${themes.join(", ")||"Open"}\nTONE: ${tones.join(", ")||"Open"}\nSPICE LEVEL: ${spice}/5\nEMOTIONAL INTENSITY: ${intensity}/5\n\nReturn exactly these sections:\n\nPLOT SKELETON 1:\nA complete plot skeleton with setup, escalation, crisis, and resolution. 100-130 words.\n\nPLOT SKELETON 2:\nA second distinct plot skeleton with a different structural approach. 100-130 words.\n\nPLOT SKELETON 3:\nA third unexpected plot skeleton that subverts at least one expectation. 100-130 words.\n\nCHARACTER CONFLICT WEB 1:\nTwo characters, their core wound, their weapon, and what they want from each other. 80 words.\n\nCHARACTER CONFLICT WEB 2:\nA second character pairing with a different conflict dynamic. 80 words.\n\nTWIST:\nOne unexpected story twist that recontextualizes everything. 50 words.\n\nARC:\nA multi-book arc suggestion showing how this expands across 3 books. 70 words.`;
    try{const raw=await callClaude(prompt,1800);setResults(parseSections(raw));}
    catch(e){setResults({critique:"Error: "+e.message});}
    setLoading(false);
  };

  const skeletons=results?[0,1,2].map(i=>results["skeleton"+i]).filter(Boolean):[];
  const conflicts=results?[0,1].map(i=>results["conflict"+i]).filter(Boolean):[];

  return(
    <div className="panel">
      <div className="eyebrow">Story Architecture</div>
      <h2 className="panel-title">Story <em>Blueprint.</em></h2>
      <p className="panel-sub">Set your parameters. StoryForge generates three plot skeletons, two character conflict webs, a twist, and a multi-book arc.</p>
      <div className="bp-grid">
        <div className="bp-form">
          <div className="bp-form-title">Story Parameters</div>
          <div className="field">
            <label className="field-label">Genre</label>
            <select className="field-select" value={genre} onChange={e=>setGenre(e.target.value)}>
              {["Dark Romance","Fantasy","Contemporary Romance","Thriller","Paranormal","Dark Academia","Romantasy","Literary Fiction"].map(g=><option key={g}>{g}</option>)}
            </select>
          </div>
          <div className="field">
            <label className="field-label">Tropes</label>
            <div className="chip-group">{TROPES.map(t=><button key={t} className={"chip"+(tropes.includes(t)?" on":"")} onClick={()=>toggleArr(tropes,setTropes,t)}>{t}</button>)}</div>
          </div>
          <div className="field">
            <label className="field-label">Themes</label>
            <div className="chip-group">{THEMES.map(t=><button key={t} className={"chip"+(themes.includes(t)?" on":"")} onClick={()=>toggleArr(themes,setThemes,t)}>{t}</button>)}</div>
          </div>
          <div className="field">
            <label className="field-label">Tone</label>
            <div className="chip-group">{TONES.map(t=><button key={t} className={"chip"+(tones.includes(t)?" on":"")} onClick={()=>toggleArr(tones,setTones,t)}>{t}</button>)}</div>
          </div>
          <div className="slider-wrap">
            <div className="slider-row"><span className="field-label" style={{margin:0}}>Spice Level</span><span className="slider-val">{spice}/5</span></div>
            <input type="range" className="slider" min={1} max={5} value={spice} onChange={e=>setSpice(+e.target.value)}/>
          </div>
          <div className="slider-wrap" style={{marginBottom:"1.5rem"}}>
            <div className="slider-row"><span className="field-label" style={{margin:0}}>Emotional Intensity</span><span className="slider-val">{intensity}/5</span></div>
            <input type="range" className="slider" min={1} max={5} value={intensity} onChange={e=>setIntensity(+e.target.value)}/>
          </div>
          <button className="btn btn-fire" style={{width:"100%"}} onClick={generate} disabled={loading}>
            {loading?<><div className="spin"/><span>Generating…</span></>:"Generate Blueprint →"}
          </button>
        </div>
        <div className="bp-results">
          {loading&&<div className="bp-empty"><div className="spin" style={{width:20,height:20}}/><p style={{marginTop:"1rem"}}>Building your story architecture…</p></div>}
          {!loading&&!results&&<div className="bp-empty"><div className="bp-empty-icon">📐</div><p>Configure and generate</p></div>}
          {results&&!loading&&<>
            {skeletons.map((s,i)=>(
              <div key={i} className="bp-card">
                <div className="bp-card-head"><span className="out-tag tag-c">Plot Skeleton {i+1}</span><div className="bp-card-num">0{i+1}</div></div>
                <div className="bp-card-body">{s.split("\n").map((l,j)=><p key={j}>{l}</p>)}</div>
              </div>
            ))}
            {conflicts.map((c,i)=>(
              <div key={i} className="bp-card">
                <div className="bp-card-head"><span className="out-tag tag-r">Conflict Web {i+1}</span></div>
                <div className="bp-card-body">{c.split("\n").map((l,j)=><p key={j}>{l}</p>)}</div>
              </div>
            ))}
            {results.twist&&<div className="bp-card"><div className="bp-card-head"><span className="out-tag tag-d">Unexpected Twist</span></div><div className="bp-card-body">{results.twist}</div></div>}
            {results.arc&&<div className="bp-card"><div className="bp-card-head"><span className="out-tag tag-b">Multi-Book Arc</span></div><div className="bp-card-body">{results.arc}</div></div>}
          </>}
        </div>
      </div>
    </div>
  );
}

// ─── REWRITE LAB ─────────────────────────────────────────────────────────────
function RewriteTab(){
  const [input,setInput]=React.useState("");
  const [tone,setTone]=React.useState("lyrical");
  const [loading,setLoading]=React.useState(false);
  const [outputs,setOutputs]=React.useState(null);
  const [tab,setTab]=React.useState("flags");
  const TONE_OPTIONS=[{key:"lyrical",label:"Lyrical"},{key:"brutal",label:"Brutal"},{key:"minimalist",label:"Minimalist"},{key:"elevated",label:"Elevated"}];

  const elevate=async()=>{
    if(!input.trim()||loading)return;
    setLoading(true);setOutputs(null);
    const prompt=`You are StoryForge's Rewrite Lab — an elite literary editor.\n\nReply with exactly these sections:\n\nFLAGS:\nList 3-5 specific issues as bullet points starting with a category like [CLICHÉ], [FLAT DIALOGUE], [PACING], [WEAK VERB], [TELLING NOT SHOWING].\n\n${tone.toUpperCase()}:\nA full rewrite of the scene in a ${tone} tone. 100-160 words.\n\nSUBTEXT:\n2-3 sentences on the subtext strategy used.\n\nHere is the scene:\n\n${input}`;
    try{const raw=await callClaude(prompt,1400);const s=parseSections(raw);if(!s.flags&&!s[tone])s.flags=raw;setOutputs(s);setTab("flags");}
    catch(e){setOutputs({flags:"Error: "+e.message});}
    setLoading(false);
  };

  const parsedFlags=outputs?.flags?outputs.flags.split("\n").filter(l=>l.trim().startsWith("-")||l.trim().startsWith("•")||l.trim().match(/^\[/)):[];
  const tabs=[{key:"flags",label:"Issues Found",cls:"tag-w"},{key:tone,label:tone.charAt(0).toUpperCase()+tone.slice(1)+" Rewrite",cls:"tag-r"},{key:"subtext",label:"Subtext Notes",cls:"tag-c"}];

  return(
    <div className="panel">
      <div className="eyebrow">Elevate Your Prose</div>
      <h2 className="panel-title">Rewrite <em>Lab.</em></h2>
      <p className="panel-sub">Paste a scene. StoryForge flags flat dialogue, clichés, and weak verbs — then rewrites it in your chosen tone without erasing your voice.</p>
      <div className="p-chips" style={{marginBottom:"1.5rem"}}>
        {TONE_OPTIONS.map(t=><button key={t.key} className={"p-chip"+(tone===t.key?" active":"")} onClick={()=>setTone(t.key)}>{t.label}</button>)}
      </div>
      <div className="rw-grid">
        <div className="forge-pane">
          <div className="pane-head"><span className="pane-title">Original Scene</span><div className="pane-dot"/></div>
          <textarea className="forge-ta" value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{if((e.metaKey||e.ctrlKey)&&e.key==="Enter")elevate();}}
            placeholder={"Paste or write your scene here…\n\nStoryForge will flag issues, then show you how to fix them."} maxLength={1200}/>
          <div className="pane-foot">
            <span className="char-ct">{input.length}/1200</span>
            <button className="btn btn-fire btn-sm" onClick={elevate} disabled={loading||!input.trim()}>
              {loading?<><div className="spin"/><span>Elevating…</span></>:"Elevate It →"}
            </button>
          </div>
        </div>
        <div className="forge-pane out-pane">
          {outputs&&<div className="out-tabs">{tabs.map(t=><button key={t.key} className={"out-tab"+(tab===t.key?" active":"")} onClick={()=>setTab(t.key)}>{t.label}</button>)}</div>}
          <div style={{padding:"1.2rem",minHeight:"200px",overflowY:"auto",maxHeight:"420px"}}>
            {loading?<div className="out-placeholder"><div className="spin"/><p style={{marginTop:"0.8rem",color:"var(--fog)"}}>Analysing your prose…</p></div>
            :!outputs?<div className="out-placeholder"><div className="out-placeholder-icon">✂️</div><p>Paste a scene to begin</p></div>
            :tab==="flags"?(
              <div><span className="out-tag tag-w">Issues Found</span>
                {parsedFlags.length>0?(
                  <div style={{marginTop:"0.8rem"}}>
                    {parsedFlags.map((f,i)=>{
                      const cat=f.match(/\[([^\]]+)\]/);const text=f.replace(/^[-•]\s*/,"").replace(/\[[^\]]+\]\s*/,"");
                      const isWarn=f.includes("FLAT")||f.includes("WEAK")||f.includes("PACING");
                      return(<div key={i} className="rw-flag"><span style={{fontSize:"0.85rem",flexShrink:0}}>{isWarn?"⚠️":"🔴"}</span><div>{cat&&<div className={"rw-flag-label "+(isWarn?"warn":"fix")}>{cat[1]}</div>}<div className="rw-flag-text">{text||f.replace(/^[-•]\s*/,"")}</div></div></div>);
                    })}
                  </div>
                ):<div className="out-body" style={{padding:0,marginTop:"0.8rem"}}>{(outputs.flags||"").split("\n\n").map((p,i)=><p key={i}>{p}</p>)}</div>}
              </div>
            ):(
              <div><span className={"out-tag "+(tabs.find(t2=>t2.key===tab)?.cls||"tag-r")}>{tabs.find(t2=>t2.key===tab)?.label}</span>
                <div className="out-body" style={{padding:0,marginTop:"0.8rem"}}>{(outputs[tab]||"Not available.").split("\n\n").map((p,i)=><p key={i}>{p}</p>)}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PROJECT TAB ─────────────────────────────────────────────────────────────
const DEFAULT_THREADS=[
  {id:1,text:"Marcus told Elena he was in London during the fire. Phone records suggest otherwise.",status:"alert"},
  {id:2,text:"The silver ring in Elena's coat pocket. Planted Ch.7. Still unexplained.",status:"warn"},
  {id:3,text:"The locked door at the east wing — mentioned twice, never opened.",status:"warn"},
  {id:4,text:"Elena forgave Marcus in Ch.11 — 4 chapters earlier than her trust arc allows.",status:"alert"},
  {id:5,text:"Power shift in Ch.10 is consistent with Marcus's established control patterns.",status:"ok"},
];
const DEFAULT_HM=[
  {key:"emotional",label:"Emotional Tension",val:7.8,pct:78,cls:"hm-hi"},
  {key:"physical",label:"Physical Tension",val:5.4,pct:54,cls:"hm-md"},
  {key:"trust",label:"Trust Level",val:2.1,pct:21,cls:"hm-lo"},
  {key:"power",label:"Power Imbalance",val:8.5,pct:85,cls:"hm-hi"},
  {key:"redemption",label:"Redemption Arc",val:1.9,pct:19,cls:"hm-lo"},
];

function ProjectTab(){
  const [threads,setThreads]=React.useState(DEFAULT_THREADS);
  const [newThread,setNewThread]=React.useState("");
  const [hmData,setHmData]=React.useState(DEFAULT_HM);
  const [animated,setAnimated]=React.useState(false);
  const hmRef=React.useRef();

  React.useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setAnimated(true);},{threshold:0.2});
    if(hmRef.current)obs.observe(hmRef.current);
    return()=>obs.disconnect();
  },[]);

  const addThread=()=>{if(!newThread.trim())return;setThreads(t=>[...t,{id:Date.now(),text:newThread,status:"warn"}]);setNewThread("");};
  const removeThread=id=>setThreads(t=>t.filter(x=>x.id!==id));
  const cycleStatus=id=>setThreads(t=>t.map(x=>x.id===id?{...x,status:x.status==="ok"?"warn":x.status==="warn"?"alert":"ok"}:x));
  const updateHm=(key,val)=>setHmData(d=>d.map(r=>r.key===key?{...r,val:+val,pct:Math.round(+val*10)}:r));
  const alerts=threads.filter(t=>t.status==="alert").length;
  const warns=threads.filter(t=>t.status==="warn").length;

  return(
    <div className="panel">
      <div className="eyebrow">Story Intelligence</div>
      <h2 className="panel-title"><em>Project</em> Overview.</h2>
      <p className="panel-sub">Track your story's secrets, planted clues, and Chekhov's guns — alongside the live emotional heat map of your central relationship.</p>
      {alerts>0&&<div className="hm-alert" style={{margin:"0 0 1.5rem"}}><div className="hm-alert-dot"/>{alerts} continuity alert{alerts>1?"s":""} and {warns} unresolved thread{warns!==1?"s":""} need attention</div>}
      <div className="project-grid">
        <div className="project-panel">
          <div className="project-panel-head">
            <div className={"proj-dot "+(alerts>0?"dot-red":"dot-green")}/>
            <span className="project-panel-title">Continuity Tracker</span>
            <span style={{marginLeft:"auto",fontFamily:"'DM Mono',monospace",fontSize:"0.5rem",color:"var(--fog)"}}>{threads.length} threads</span>
          </div>
          <div className="tracker-list">
            {threads.map(t=>(
              <div key={t.id} className="tracker-item">
                <span className="ti-icon" onClick={()=>cycleStatus(t.id)}>{t.status==="alert"?"🔴":t.status==="warn"?"🟡":"✅"}</span>
                <div style={{flex:1}}>
                  <div className={"ti-label "+t.status}>{t.status==="alert"?"Alert":t.status==="warn"?"Unresolved":"Resolved"}</div>
                  <div className="ti-desc">{t.text}</div>
                </div>
                <button onClick={()=>removeThread(t.id)} style={{background:"none",border:"none",color:"var(--ash)",cursor:"pointer",fontSize:"0.75rem",padding:"0.2rem",flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
          <div className="add-thread-row">
            <input className="add-thread-input" placeholder="Add a plot thread, clue, or secret…" value={newThread} onChange={e=>setNewThread(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addThread();}}/>
            <button className="btn btn-fire btn-sm" onClick={addThread}>Add</button>
          </div>
        </div>
        <div className="project-panel" ref={hmRef}>
          <div className="project-panel-head"><div className="proj-dot dot-red"/><span className="project-panel-title">Relationship Heat Map</span></div>
          {hmData.filter(r=>r.val<3).length>0&&<div className="hm-alert"><div className="hm-alert-dot"/>{hmData.find(r=>r.val<3)?.label} critically low</div>}
          <div className="hm-rows">
            {hmData.map(row=>(
              <div key={row.key}>
                <div className="hm-top"><span className="hm-label">{row.label}</span><span className="hm-val">{row.val.toFixed(1)}</span></div>
                <div className="hm-track"><div className={"hm-fill "+row.cls} style={{width:animated?row.pct+"%":"0%"}}/></div>
              </div>
            ))}
          </div>
          <div className="hm-edit-row">
            {hmData.slice(0,4).map(row=>(
              <div key={row.key}>
                <div className="hm-slider-label">{row.label.split(" ")[0]}</div>
                <input type="range" className="slider" min={0} max={10} step={0.1} value={row.val} onChange={e=>updateHm(row.key,e.target.value)}/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


// ─── WORKER SETUP MODAL ───────────────────────────────────────────────────────
function WorkerSetupModal({ onSave }) {
  const [url, setUrl] = React.useState(localStorage.getItem('sf_worker_url') || '');
  const [error, setError] = React.useState('');

  const save = () => {
    const trimmed = url.trim();
    if (!trimmed) { setError('Please enter a URL.'); return; }
    if (!trimmed.startsWith('http')) { setError('URL must start with https://'); return; }
    localStorage.setItem('sf_worker_url', trimmed);
    window.STORYFORGE_WORKER_URL = trimmed;
    onSave();
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.2s ease',backdropFilter:'blur(4px)'}}>

          <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.55rem',letterSpacing:'0.22em',textTransform:'uppercase',color:'var(--ember)',marginBottom:'0.5rem'}}>One-Time Setup</div>
          <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'1.9rem',fontWeight:300,color:'var(--cream)',lineHeight:1.1}}>Connect your <em style={{fontStyle:'italic',color:'var(--sepia)'}}>Forge.</em></h2>
        </div>
        <div style={{padding:'1.5rem 2rem 2rem'}}>
          <p style={{fontSize:'0.88rem',color:'var(--mist)',lineHeight:1.8,marginBottom:'1.5rem'}}>
            StoryForge uses a Cloudflare Worker to call the AI securely. Paste your deployed worker URL below — it's saved locally and never shared.
          </p>
          <div style={{background:'var(--slate)',border:'1px solid rgba(201,75,26,0.1)',padding:'1rem 1.2rem',marginBottom:'1.5rem',fontSize:'0.82rem',color:'var(--fog)',lineHeight:1.8}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--sepia)',marginBottom:'0.6rem'}}>Don't have a worker yet?</div>
            1. Go to <strong style={{color:'var(--parchment)'}}>workers.cloudflare.com</strong> (free)<br/>
            2. Create a Worker → paste <strong style={{color:'var(--parchment)'}}>worker.js</strong><br/>
            3. Settings → Variables → add secret <strong style={{color:'var(--parchment)'}}>ANTHROPIC_API_KEY</strong><br/>
            4. Deploy → copy the URL → paste below
          </div>
          {error && <div style={{background:'rgba(201,75,26,0.12)',border:'1px solid rgba(201,75,26,0.3)',color:'var(--ember)',fontFamily:"'DM Mono',monospace",fontSize:'0.58rem',padding:'0.6rem 0.9rem',marginBottom:'1rem'}}>{error}</div>}
          <div style={{marginBottom:'1.2rem'}}>
            <label style={{fontFamily:"'DM Mono',monospace",fontSize:'0.52rem',letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--fog)',display:'block',marginBottom:'0.4rem'}}>Worker URL</label>
            <input
              value={url}
              onChange={e => { setUrl(e.target.value); setError(''); }}
              onKeyDown={e => { if(e.key==='Enter') save(); }}
              placeholder="https://storyforge.your-name.workers.dev"
              style={{width:'100%',background:'var(--slate)',border:'1px solid rgba(122,111,98,0.2)',color:'var(--parchment)',fontFamily:"'Libre Baskerville',serif",fontSize:'0.88rem',padding:'0.75rem 1rem',outline:'none',boxSizing:'border-box'}}
              autoFocus
            />
          </div>
          <button
            onClick={save}
            style={{width:'100%',padding:'0.85rem',background:'var(--ember)',color:'white',border:'none',fontFamily:"'DM Mono',monospace",fontSize:'0.6rem',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'0.5rem'}}
          >
            Save & Start Forging →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]           = React.useState(null);
  const [modal, setModal]         = React.useState(null);
  const [showWorker, setShowWorker] = React.useState(!window.STORYFORGE_WORKER_URL);

  React.useEffect(() => {
    const handler = () => setShowWorker(true);
    window.addEventListener('sf-needs-url', handler);
    return () => window.removeEventListener('sf-needs-url', handler);
  }, []);

  const handleAuth = (userData) => { setUser(userData); setModal(null); };
  const handleSignOut = () => { setUser(null); setModal(null); };

  return (
    <>
      {showWorker && <WorkerSetupModal onSave={() => setShowWorker(false)} />}
      {!showWorker && !user && (
        <>
          <Landing
            onSignIn={() => setModal("signin")}
            onSignUp={() => setModal("signup")}
          />
          {modal && <AuthModal initialMode={modal} onAuth={handleAuth} onClose={() => setModal(null)} />}
        </>
      )}
      {!showWorker && user && <Dashboard user={user} onSignOut={handleSignOut} />}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
